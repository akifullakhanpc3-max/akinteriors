server {
    listen 80;
    server_name akinteriors.com www.akinteriors.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name akinteriors.com www.akinteriors.com;

    ssl_certificate /etc/letsencrypt/live/akinteriors.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akinteriors.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/akinteriors/public;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Gzip
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        gzip_proxied any;
        gzip_min_length 1000;
    }

    location /_next/static {
        alias /var/www/akinteriors/.next/static;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location /public/uploads {
        alias /var/www/akinteriors/public/uploads;
        expires 30d;
        access_log off;
    }
}
